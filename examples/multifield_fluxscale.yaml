# Multi-field solve with fluxscale
#
# Chain:
#   Step 1: solve K on [3C147]
#   Step 2: solve G on [3C147, 3C286]  — preapply K
#   Step 3: solve G on [PKS1934, J0538] — preapply K + G
#
# Then fluxscale G from PKS1934/J0538 using 3C147
# Then apply to science target

solve:
  - ms: all_cals.ms
    output: cal.h5
    ref_ant: 0
    solver_backend: jax_scipy
    rfi_threshold: 5.0
    max_iter: 100
    tol: 1.0e-10

    jones:         [K,       G,                     G               ]
    field:         [[3C147], [3C147, 3C286],         [PKS1934, J0538]]
    time_interval: [inf,     inf,                    5min            ]
    freq_interval: [full,    full,                   full            ]
    phase_only:    [false,   false,                  false           ]
    preapply_time_interp: [exact, nearest, nearest]

    # CASA-native SPW:channel selection
    # spw: "0:10~500,1:10~500"
    # Per-step SPW override (optional):
    # step_spw: ["0,1", "0,1", "0:10~500,1:10~500"]

fluxscale:
  - reference_table: cal.h5
    reference_field: 3C147
    transfer_table: cal.h5
    transfer_field: [PKS1934, J0538]
    output: cal_scaled.h5
    jones_type: G

apply:
  - ms: science.ms
    output_col: CORRECTED_DATA
    target_field: NGC1234

    jones:        [K,      G,             G            ]
    tables:       [cal.h5, cal_scaled.h5, cal_scaled.h5]
    field_select: [nearest_time, nearest_sky,  nearest_sky  ]
    time_interp:  [exact,        linear,        cubic        ]
