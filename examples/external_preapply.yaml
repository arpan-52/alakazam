# Use solutions from a previous run as preapply
# Solve only G1 with K0 and G0 from a previous cal table

solve:
  - ms: newdata.ms
    output: newcal.h5
    ref_ant: C04
    solver_backend: jax_scipy

    jones: [G]
    field: [3C286]
    time_interval: 2min
    freq_interval: full
    preapply_time_interp: nearest

    external_preapply:
      tables: [oldcal.h5, oldcal.h5]
      jones: [K0, G0]
      field_select: [nearest_time, nearest_time]
      time_interp: [nearest, nearest]

apply:
  - ms: newdata.ms
    output_col: CORRECTED_DATA
    jones:  [K0, G0, G0]
    tables: [oldcal.h5, oldcal.h5, newcal.h5]
    field_select: nearest_time
    time_interp: [nearest, nearest, linear]
