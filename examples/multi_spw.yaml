# Multi-SPW calibration
#
# Each SPW is calibrated independently — different frequency grids,
# different solutions. The solve loop iterates over SPWs automatically.
#
# Apply also iterates per SPW, matching solutions by SPW ID.

solve:
  - ms: multiband.ms
    output: cal.h5
    ref_ant: C04
    solver_backend: ceres
    spw: "0,1,2,3"                 # calibrate SPWs 0-3

    jones: [K, G]
    field:
      - [3C286]
      - [3C286]
    time_interval: [scan, 2min]
    freq_interval: [full, full]
    preapply_time_interp: [exact, nearest]

apply:
  - ms: multiband.ms
    output_col: CORRECTED_DATA
    spw: "0,1,2,3"

    jones:  [K0, G0]
    tables: [cal.h5, cal.h5]
    field_select: nearest_time
    time_interp: [nearest, linear]
