# Simple delay + gain calibration
# K0: one delay per scan, full band
# G0: one gain per 2 minutes, full band

solve:
  - ms: calibrators.ms
    output: cal.h5
    ref_ant: C04
    data_col: DATA
    model_col: MODEL_DATA
    solver_backend: jax_scipy

    jones: [K, G]
    field: [3C286, 3C286]
    time_interval: [scan, 2min]
    freq_interval: [full, full]
    preapply_time_interp: [exact, nearest]

apply:
  - ms: science.ms
    output_col: CORRECTED_DATA
    jones:  [K0, G0]
    tables: [cal.h5, cal.h5]
    field_select: [nearest_time, nearest_time]
    time_interp: [nearest, linear]
