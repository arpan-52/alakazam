# Full polarization calibration
# K0: parallel delay
# G0: bandpass gains (freq-dependent)
# G1: time-variable gains
# D0: leakage
# KC0: cross-hand delay
# CP0: cross-hand phase

solve:
  - ms: polcal.ms
    output: polcal.h5
    ref_ant: 9
    apply_parang: true
    solver_backend: jax

    jones: [K, G, G, D, KC, CP]

    field:
      - [3C286]        # K
      - [3C286]        # G bandpass
      - [3C286]        # G time
      - [3C286]        # D
      - [3C286]        # KC
      - [3C286]        # CP

    time_interval: [scan, inf, 5min, inf, inf, inf]
    freq_interval: [full, 4MHz, full, full, full, full]
    preapply_time_interp: [exact, nearest, nearest, nearest, nearest, nearest]

apply:
  - ms: science.ms
    output_col: CORRECTED_DATA
    apply_parang: true
    propagate_flags: true

    jones:  [K0, G0, G1, D0, KC0, CP0]
    tables: [polcal.h5, polcal.h5, polcal.h5, polcal.h5, polcal.h5, polcal.h5]
    field_select: nearest_time
    time_interp: [nearest, nearest, linear, nearest, nearest, nearest]
